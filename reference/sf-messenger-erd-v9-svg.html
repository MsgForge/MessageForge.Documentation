<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Messenger Plugin — ERD v9 (SVG)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #181c25;
    --surface-hover: #1e2330;
    --border: #2a3040;
    --border-hi: #3a4560;
    --text: #d0d4dc;
    --text-dim: #717a8c;
    --text-bright: #f0f2f6;
    --header-bg: #1a2030;
    --pk: #c49cff;
    --fk: #ff9f43;
    --uk: #6cc3f0;
    --enc: #ff6b6b;
    --md-line: #3fb950;
    --lk-line: #58a6ff;
    --txt-line: #6e7681;
    --std-bg: #1a1a2e;
    --meta-bg: #1a2520;
    --config-bg: #201a1a;
  }

  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    cursor: grab;
    user-select: none;
  }
  body.dragging { cursor: grabbing; }

  .toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(15, 17, 23, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .toolbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: -0.3px;
  }
  .toolbar .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .legend-line {
    width: 28px;
    height: 0;
    border-top: 2.5px solid;
  }
  .legend-line.md { border-color: var(--md-line); }
  .legend-line.lk { border-color: var(--lk-line); border-top-style: dashed; }
  .legend-line.txt { border-color: var(--txt-line); border-top-style: dotted; }
  .legend-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .legend-dot.pk { background: var(--pk); }
  .legend-dot.fk { background: var(--fk); }
  .legend-dot.uk { background: var(--uk); }
  .legend-dot.enc { background: var(--enc); }

  .controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .controls button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .controls button:hover { background: var(--surface-hover); }
  .controls .zoom-label {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 36px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
  }

  #canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div class="toolbar">
  <div>
    <h1>SF Messenger Plugin — Data Model v9</h1>
    <div class="subtitle">Interactive ERD &middot; Scroll to zoom &middot; Drag to pan &middot; Arrows show FK source → target</div>

  // ── Config Objects ──
  Telegram_Config__c: {

    category: 'config',
    x: 20, y: 650,
    fields: [
      { name: 'Channel__c', type: 'master_detail', badge: 'FK' },
      { name: 'Account_Type__c', type: 'picklist' },
      { name: 'Bot_Token__c', type: 'encrypted', badge: 'ENC' },
      { name: 'Bot_Username__c', type: 'text' },

  WhatsApp_Config__c: {

    fields: [
      { name: 'Channel__c', type: 'master_detail', badge: 'FK' },

  Viber_Config__c: {
    label: 'Viber_Config__c',
    category: 'config',
    x: 620, y: 650,
    fields: [
      { name: 'Channel__c', type: 'master_detail', badge: 'FK' },
      { name: 'Auth_Token__c', type: 'encrypted', badge: 'ENC' },
      { name: 'Bot_Name__c', type: 'text' },

  },
  Twilio_Config__c: {
    label: 'Twilio_Config__c',
    category: 'config',
    x: 620, y: 810,
    fields: [
      { name: 'Channel__c', type: 'master_detail', badge: 'FK' },
      { name: 'Phone_Number__c', type: 'phone' },

      { name: 'Access_Key__c', type: 'encrypted', badge: 'ENC' },

    fields: [

      { name: 'Event_Detail__c', type: 'longtext' },

  // ── Chat & Messages ──
  Messenger_Chat__c: {
    label: 'Messenger_Chat__c',
    category: 'core',
    x: 880, y: 760,
    fields: [
      { name: 'Channel__c', type: 'lookup', badge: 'FK' },
      { name: 'Lead__c', type: 'lookup', badge: 'FK' },
      { name: 'Contact__c', type: 'lookup', badge: 'FK' },
      { name: 'Assigned_User__c', type: 'lookup', badge: 'FK' },
      { name: 'Chat_External_ID__c', type: 'text', badge: 'UK' },
      { name: 'Status__c', type: 'picklist' },
      { name: 'Last_Message_At__c', type: 'datetime' },
      { name: 'Unread_Count__c', type: 'number' },
    ]
  },
  Messenger_Message__c: {
    label: 'Messenger_Message__c',
    category: 'core',
    x: 880, y: 1050,
    fields: [
      { name: 'Chat__c', type: 'master_detail', badge: 'FK' },
      { name: 'Message_External_ID__c', type: 'text', badge: 'UK' },
      { name: 'Sender_Name__c', type: 'text' },
      { name: 'Message_Text__c', type: 'longtext' },
      { name: 'Direction__c', type: 'picklist' },
      { name: 'Message_Type__c', type: 'picklist' },
      { name: 'Media_URL__c', type: 'url' },
      { name: 'Delivery_Status__c', type: 'picklist' },
      { name: 'Sent_At__c', type: 'datetime' },
    ]
  },
};

// Relationships: from field in source table → to target table header
// type: 'md' | 'lk' | 'txt'
const relationships = [
  // Channel_Type text ref
  { from: 'Messenger_Channel__c', field: 'Channel_Type_API_Name__c', to: 'Channel_Type__mdt', type: 'txt', label: 'text ref' },
  // App → Channel
  { from: 'Messenger_Channel__c', field: 'App__c', to: 'Messenger_App__c', type: 'lk', label: 'lookup nullable' },
  // App owner
  { from: 'Messenger_App__c', field: 'Owner__c', to: 'SF_User', type: 'lk', label: 'lookup' },
  // Channel owner
  { from: 'Messenger_Channel__c', field: 'Owner', to: 'SF_User', type: 'lk', label: 'lookup' },
  // Config MD 1:1
  { from: 'Telegram_Config__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  { from: 'WhatsApp_Config__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  { from: 'Viber_Config__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  { from: 'Twilio_Config__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  { from: 'Vonage_Config__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  { from: 'Bird_Config__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  { from: 'Apple_Messages_Config__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  // Access
  { from: 'Channel_User_Access__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'md', label: 'MD cascade' },
  { from: 'Channel_User_Access__c', field: 'User__c', to: 'SF_User', type: 'lk', label: 'lookup' },
  // Audit
  { from: 'Channel_Audit_Log__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'lk', label: 'lookup survives' },
  { from: 'Channel_Audit_Log__c', field: 'Performed_By__c', to: 'SF_User', type: 'lk', label: 'lookup' },
  // Chat
  { from: 'Messenger_Chat__c', field: 'Channel__c', to: 'Messenger_Channel__c', type: 'lk', label: 'lookup survives' },
  { from: 'Messenger_Chat__c', field: 'Lead__c', to: 'Lead', type: 'lk', label: 'lookup nullable' },
  { from: 'Messenger_Chat__c', field: 'Contact__c', to: 'Contact', type: 'lk', label: 'lookup nullable' },
  { from: 'Messenger_Chat__c', field: 'Assigned_User__c', to: 'SF_User', type: 'lk', label: 'lookup' },
  // Message
  { from: 'Messenger_Message__c', field: 'Chat__c', to: 'Messenger_Chat__c', type: 'md', label: 'MD cascade' },
];

// ─── COLORS ─────────────────────────────────────────
const COLORS = {
  md: '#3fb950',
  lk: '#58a6ff',
  txt: '#6e7681',
  PK: '#c49cff',
  FK: '#ff9f43',
  UK: '#6cc3f0',
  ENC: '#ff6b6b',
};

const CAT_HEADER = {
  meta: '#1a3028',
  std: '#1a1a30',
  core: '#1a2235',
  config: '#2a1a1a',
};
const CAT_BODY = {
  meta: '#141e1a',
  std: '#14141e',
  core: '#141a22',
  config: '#1e1414',
};

// ─── SVG HELPERS ────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

// ─── RENDER ─────────────────────────────────────────
const world = document.getElementById('world');

// Pre-compute table heights and store field positions
const tableInfo = {};
for (const [id, t] of Object.entries(tables)) {
  const h = HDR_H + t.fields.length * ROW_H + 6;
  tableInfo[id] = { ...t, w: TABLE_W, h, fieldY: {} };
  t.fields.forEach((f, i) => {
    tableInfo[id].fieldY[f.name] = t.y + HDR_H + i * ROW_H + ROW_H / 2;
  });
}

// Draw connections FIRST (behind tables)
const connGroup = el('g', { id: 'connections' }, world);
for (const rel of relationships) {
  const src = tableInfo[rel.from];
  const tgt = tableInfo[rel.to];
  if (!src || !tgt) continue;

  const fieldIdx = src.fields ? src.fields.findIndex(f => f.name === rel.field) : -1;
  const srcFieldY = fieldIdx >= 0 ? src.y + HDR_H + fieldIdx * ROW_H + ROW_H / 2 : src.y + HDR_H / 2;

  // Determine connection side
  const srcCx = src.x + src.w / 2;
  const tgtCx = tgt.x + tgt.w / 2;
  const tgtCy = tgt.y + tgt.h / 2;

  let srcX, tgtX, tgtY;

  // Source: exit from left or right side
  if (srcCx > tgtCx + tgt.w / 2) {
    srcX = src.x; // exit left
  } else if (srcCx + src.w / 2 < tgtCx) {
    srcX = src.x + src.w; // exit right
  } else {
    // Overlapping X — go top or bottom
    srcX = src.x + src.w / 2;
  }

  // Target: arrive at closest side
  const midX = srcX;
  if (tgtCy > srcFieldY) {
    // Target is below
    if (Math.abs(srcCx - tgtCx) < tgt.w) {
      tgtX = tgt.x + tgt.w / 2;
      tgtY = tgt.y;
    } else if (srcCx < tgtCx) {
      tgtX = tgt.x;
      tgtY = tgt.y + tgt.h / 2;
    } else {
      tgtX = tgt.x + tgt.w;
      tgtY = tgt.y + tgt.h / 2;
    }
  } else {
    // Target is above or same level
    if (srcCx < tgtCx) {
      tgtX = tgt.x;
      tgtY = tgt.y + tgt.h / 2;
    } else if (srcCx > tgtCx + tgt.w) {
      tgtX = tgt.x + tgt.w;
      tgtY = tgt.y + tgt.h / 2;
    } else {
      tgtX = tgt.x + tgt.w / 2;
      tgtY = tgt.y + tgt.h;
    }
  }

  // Smart routing: determine exit/entry points
  let x1, y1, x2, y2;
  const srcLeft = src.x;
  const srcRight = src.x + src.w;
  const tgtLeft = tgt.x;
  const tgtRight = tgt.x + tgt.w;
  const tgtTop = tgt.y;
  const tgtBot = tgt.y + tgt.h;

  y1 = srcFieldY;

  // Choose exit side
  const distLeft = Math.abs(srcLeft - tgtCx);
  const distRight = Math.abs(srcRight - tgtCx);
  if (distLeft < distRight) {
    x1 = srcLeft;
  } else {
    x1 = srcRight;
  }

  // Choose entry point on target
  // Find closest point on target boundary
  const candidates = [
    { x: tgtLeft, y: Math.max(tgtTop, Math.min(tgtBot, y1)), side: 'left' },
    { x: tgtRight, y: Math.max(tgtTop, Math.min(tgtBot, y1)), side: 'right' },
    { x: Math.max(tgtLeft, Math.min(tgtRight, x1)), y: tgtTop, side: 'top' },
    { x: Math.max(tgtLeft, Math.min(tgtRight, x1)), y: tgtBot, side: 'bottom' },
  ];

  let best = candidates[0];
  let bestDist = Infinity;
  for (const c of candidates) {
    const d = Math.hypot(c.x - x1, c.y - y1);
    if (d < bestDist) { bestDist = d; best = c; }
  }
  x2 = best.x;
  y2 = best.y;

  // Build path with rounded corners
  const color = COLORS[rel.type] || '#555';
  const dasharray = rel.type === 'lk' ? '6,4' : rel.type === 'txt' ? '3,3' : 'none';

  // Create orthogonal path
  let path;
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;

  if (best.side === 'left' || best.side === 'right') {
    // Horizontal routing
    path = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
  } else {
    // Vertical routing
    path = `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
  }

  const markerEnd = `url(#arrow-${rel.type})`;

  el('path', {
    d: path,
    fill: 'none',
    stroke: color,
    'stroke-width': '1.8',
    'stroke-dasharray': dasharray === 'none' ? '' : dasharray,
    'marker-end': markerEnd,
    opacity: '0.75',
  }, connGroup);

  // Highlight dot at source field
  el('circle', {
    cx: x1,
    cy: y1,
    r: '3',
    fill: color,
    opacity: '0.9',
  }, connGroup);
}

// Draw tables
const tableGroup = el('g', { id: 'tables' }, world);
for (const [id, t] of Object.entries(tableInfo)) {
  const g = el('g', { class: 'table', 'data-id': id, transform: `translate(${t.x},${t.y})` }, tableGroup);

  // Body background
  el('rect', {
    x: 0, y: 0,
    width: t.w, height: t.h,
    rx: 6,
    fill: CAT_BODY[t.category] || '#181c25',
    stroke: '#2a3040',
    'stroke-width': '1',
    filter: 'url(#shadow)',
  }, g);

  // Header background
  el('rect', {
    x: 0, y: 0,
    width: t.w, height: HDR_H,
    rx: 6,
    fill: CAT_HEADER[t.category] || '#1a2030',
  }, g);
  // Fix bottom corners of header
  el('rect', {
    x: 0, y: HDR_H - 8,
    width: t.w, height: 8,
    fill: CAT_HEADER[t.category] || '#1a2030',
  }, g);

  // Header text
  el('text', {
    x: t.w / 2, y: HDR_H / 2 + 1,
    'text-anchor': 'middle',
    'dominant-baseline': 'central',
    fill: '#f0f2f6',
    'font-size': '11.5',
    'font-weight': '600',
    'font-family': "'IBM Plex Sans', sans-serif",
  }, g).textContent = t.label;

  // Separator line
  el('line', {
    x1: 0, y1: HDR_H,
    x2: t.w, y2: HDR_H,
    stroke: '#2a3040',
    'stroke-width': '1',
  }, g);

  // Fields
  t.fields.forEach((f, i) => {
    const fy = HDR_H + i * ROW_H;

    // Alternating row bg
    if (i % 2 === 1) {
      el('rect', {
        x: 1, y: fy,
        width: t.w - 2, height: ROW_H,
        fill: 'rgba(255,255,255,0.02)',
        rx: i === t.fields.length - 1 ? 4 : 0,
      }, g);
    }

    // Field name
    const nameColor = f.badge === 'FK' ? COLORS.FK :
                      f.badge === 'PK' ? COLORS.PK :
                      f.badge === 'UK' ? COLORS.UK :
                      f.badge === 'ENC' ? COLORS.ENC : '#c0c4cc';

    el('text', {
      x: PAD, y: fy + ROW_H / 2,
      'dominant-baseline': 'central',
      fill: nameColor,
      'font-size': '10.5',
      'font-weight': f.badge ? '500' : '400',
      'font-family': "'IBM Plex Mono', monospace",
    }, g).textContent = f.name;

    // Type
    el('text', {
      x: PAD + COL_W_NAME, y: fy + ROW_H / 2,
      'dominant-baseline': 'central',
      fill: '#717a8c',
      'font-size': '10',
      'font-family': "'IBM Plex Mono', monospace",
    }, g).textContent = f.type;

    // Badge
    if (f.badge) {
      const bx = t.w - PAD - COL_W_BADGE + 4;
      const by = fy + 3;
      const badgeColor = COLORS[f.badge] || '#555';
      el('rect', {
        x: bx, y: by,
        width: COL_W_BADGE - 4, height: ROW_H - 6,
        rx: 3,
        fill: badgeColor,
        opacity: '0.15',
      }, g);
      el('text', {
        x: bx + (COL_W_BADGE - 4) / 2,
        y: fy + ROW_H / 2,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        fill: badgeColor,
        'font-size': '8.5',
        'font-weight': '600',
        'font-family': "'IBM Plex Mono', monospace",
      }, g).textContent = f.badge;
    }
  });
}

// ─── PAN & ZOOM ─────────────────────────────────────
let scale = 0.85;
let tx = 40, ty = 70;
let dragging = false;
let lastX, lastY;

function applyTransform() {
  world.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}
applyTransform();

const canvas = document.getElementById('canvas');
canvas.addEventListener('mousedown', e => {
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  document.body.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX;
  ty += e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  document.body.classList.remove('dragging');
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.08 : 0.92;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * zoomFactor;
  ty = my - (my - ty) * zoomFactor;
  scale *= zoomFactor;
  scale = Math.max(0.2, Math.min(3, scale));
  applyTransform();
}, { passive: false });

document.getElementById('zoom-in').onclick = () => { scale = Math.min(3, scale * 1.15); applyTransform(); };
document.getElementById('zoom-out').onclick = () => { scale = Math.max(0.2, scale * 0.85); applyTransform(); };
document.getElementById('zoom-fit').onclick = () => {
  scale = 0.7;
  tx = 30;
  ty = 60;
  applyTransform();
};
</script>
